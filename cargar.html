<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cargar — VegasBett</title>
  <link rel="stylesheet" href="assets/styles.css?v=21"/>
  <style>
    .btn-copy { transition: all 0.3s; border: none; background: #333; color: white; border-radius: 4px; padding: 2px 8px; cursor: pointer; }
    #avisoMinimo { transition: all 0.3s ease; border-left: 5px solid #000; }
  </style>

  <script>
    window.VEGASBETT_CONFIG = {
      ATENCION: {
        CLARA: { nombre: "Clara", numero: "5492236631329", inicio: 8, fin: 20 },
        JULI: { nombre: "Juli", numero: "5492235393540", inicio: 20, fin: 8 }
      },
      CBU: "0000003100056935839518",
      ALIAS: "vegass.bet",
      TITULAR: "Priscila Correa",
      MIN_GRAL: 1000,      // Mínimo para carga normal y bienvenida
      MIN_PROMO_DIA: 4000,  // Mínimo para el bono del día
      PROMO_BONUS_BY_DAY: { 0: 10, 1: 5, 2: 10, 3: 5, 4: 5, 5: 10, 6: 10 }
    };

    function enviarCarga() {
        const ahora = new Date();
        const config = window.VEGASBETT_CONFIG;
        const encargado = (ahora.getHours() >= config.ATENCION.CLARA.inicio && ahora.getHours() < config.ATENCION.CLARA.fin) ? config.ATENCION.CLARA : config.ATENCION.JULI;
        const nombre = document.getElementById('nombre').value.trim();
        const monto = parseInt(document.getElementById('monto').value) || 0;
        
        const urlParams = new URLSearchParams(window.location.search);
        const tipoPromo = urlParams.get('promo');

        if(!nombre) { alert("Por favor, ingresá tu nombre de usuario."); return; }

        // --- RESTRICCIONES DE MONTO ---
        if (tipoPromo === 'today') {
            if (monto < config.MIN_PROMO_DIA) {
                alert(`❌ El monto mínimo para el Bono del Día es de $${config.MIN_PROMO_DIA}.`);
                return;
            }
        } else {
            if (monto < config.MIN_GRAL) {
                alert(`❌ El monto mínimo de carga es de $${config.MIN_GRAL}.`);
                return;
            }
        }

        let mensaje = `Hola ${encargado.nombre}, soy *${nombre}*.\n`;
        
        if (tipoPromo === 'today') {
            const bono = config.PROMO_BONUS_BY_DAY[ahora.getDay()];
            mensaje += `Quiero cargar $${monto} con mi *Bono del Día ${bono}%* 🚀`;
        } else if (tipoPromo === 'new') {
            mensaje += `Quiero cargar $${monto} con mi *Bono de Bienvenida 35%* 🎁`;
        } else {
            mensaje += `Quiero *CARGAR* $${monto}.`;
        }

        window.open(`https://wa.me/${encargado.numero}?text=${encodeURIComponent(mensaje + "\n\nEnvío comprobante.")}`, "_blank");
    }

    function copiar(id, btn) {
        const text = id === 'cbu' ? window.VEGASBETT_CONFIG.CBU : window.VEGASBETT_CONFIG.ALIAS;
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerHTML;
            btn.innerHTML = "✅ ¡Copiado!";
            btn.style.background = "#25D366";
            setTimeout(() => { btn.innerHTML = originalText; btn.style.background = ""; }, 2000);
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        const config = window.VEGASBETT_CONFIG;
        document.getElementById('display-titular').textContent = config.TITULAR;
        document.getElementById('display-alias').textContent = config.ALIAS;
        document.getElementById('display-cbu').textContent = config.CBU;

        document.getElementById('monto').addEventListener('input', (e) => {
            const monto = parseInt(e.target.value) || 0;
            const urlParams = new URLSearchParams(window.location.search);
            const tipoPromo = urlParams.get('promo');
            const aviso = document.getElementById('avisoMinimo');
            
            let porcentaje = 0;
            let minimoRequerido = config.MIN_GRAL;

            if (tipoPromo === 'new') {
                porcentaje = 35;
            } else if (tipoPromo === 'today') {
                porcentaje = config.PROMO_BONUS_BY_DAY[new Date().getDay()];
                minimoRequerido = config.MIN_PROMO_DIA;
            }

            if (monto > 0) {
                aviso.style.display = "block";
                if (monto < minimoRequerido) {
                    aviso.style.background = "#ff4444";
                    aviso.style.color = "#fff";
                    aviso.innerHTML = `⚠️ El mínimo para esta carga es $${minimoRequerido}`;
                } else if (porcentaje > 0) {
                    const extra = Math.floor(monto * (porcentaje / 100));
                    aviso.style.background = "#c29c36";
                    aviso.style.color = "#000";
                    aviso.innerHTML = `Carga: $${monto} + Bono (${porcentaje}%): $${extra} <br> <strong>Créditos a recibir: $${monto + extra}</strong>`;
                } else {
                    aviso.style.display = "none";
                }
            } else {
                aviso.style.display = "none";
            }
        });
    });
  </script>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2 class="center">Cargar Créditos</h2>
      <p id="avisoMinimo" class="center" style="display:none; padding: 10px; border-radius: 8px; font-size: 14px; margin-bottom: 15px;"></p>
      
      <div class="form">
        <input type="text" id="nombre" placeholder="Tu nombre de usuario"/>
        <input type="number" id="monto" placeholder="Monto a cargar"/>
        
        <div class="bank-info" style="background: #1e2029; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #333;">
            <p><strong>Titular:</strong> <span id="display-titular"></span></p>
            <p style="margin: 12px 0;"><strong>Alias:</strong> <span id="display-alias" style="color: #d4af37; font-weight: bold;"></span> 
               <button class="btn-copy" onclick="copiar('alias', this)">Copiar</button></p>
            <p><strong>CBU:</strong> <span id="display-cbu" style="color: #d4af37; font-weight: bold;"></span> 
               <button class="btn-copy" onclick="copiar('cbu', this)">Copiar</button></p>
        </div>

        <button class="btn ok" onclick="enviarCarga()">Informar Carga por WhatsApp</button>
        <a href="index.html" class="btn secondary" style="display: block; text-align: center; margin-top: 10px; text-decoration: none;">Volver atrás</a>
      </div>
    </div>
  </div>
</body>
</html>
