<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VegasBett — Centro de Atención</title>
  <link rel="stylesheet" href="assets/styles.css?v=19"/>
  <script>
    window.VEGASBETT_CONFIG = {
      ATENCION: {
        CLARA: { nombre: "Clara", numero: "5492236631329", inicio: 8, fin: 20 },
        JULI: { nombre: "Juli", numero: "5492235393540", inicio: 20, fin: 8 }
      },
      PLATAFORMA_URL: "https://ganamosnet.club/home",
      // Configuración de bonos por día (0: Dom, 1: Lun, etc.)
      PROMOS: { 0: 10, 1: 5, 2: 10, 3: 5, 4: 5, 5: 10, 6: 10 }
    };

    window.addEventListener('DOMContentLoaded', () => {
        const ahora = new Date();
        const config = window.VEGASBETT_CONFIG;
        const diaSemana = ahora.getDay();
        const porcentajeHoy = config.PROMOS[diaSemana];

        // Lógica de atención horaria
        const encargado = (ahora.getHours() >= config.ATENCION.CLARA.inicio && ahora.getHours() < config.ATENCION.CLARA.fin) ? config.ATENCION.CLARA : config.ATENCION.JULI;
        
        // Actualizar botón de WhatsApp
        const btnWS = document.getElementById('btnAtencionDinamica');
        btnWS.textContent = `Chatear con ${encargado.nombre} (Online)`;
        btnWS.onclick = () => {
            window.open(`https://wa.me/${encargado.numero}?text=Hola%20${encargado.nombre},%20necesito%20ayuda%20con%20VegasBett.`, "_blank");
        };

        // Actualizar botón de Bono del Día
        const btnBonoDia = document.getElementById('btnBonoDia');
        btnBonoDia.textContent = `Bono del Día (${porcentajeHoy}%)`;
        
        // Configurar enlaces
        document.getElementById('year').textContent = ahora.getFullYear();
        document.getElementById('btnPlataforma').href = config.PLATAFORMA_URL;
    });
  </script>
</head>
<body>
  <div class="container">
    <div class="card">
      <!-- Encabezado -->
      <div class="brand center" style="font-size: 24px; font-weight: bold; color: #d4af37; margin-bottom: 5px;">🎰 VegasBett</div>
      
      <!-- Imagen de Portada (Corregida para que no se vea gigante) -->
      <div style="width: 100%; max-width: 400px; margin: 10px auto; overflow: hidden; display: block;">
        <img src="assets/portada_paginaweb.png" style="width: 100%; height: auto; border-radius: 12px; border: 1px solid #333; display: block;" alt="VegasBett">
      </div>

      <h1 class="center" style="font-size: 1.1rem; margin-bottom: 15px;">Panel de Usuario</h1>

      <!-- Acciones Destacadas -->
      <div class="featured-actions" style="display: flex; flex-direction: column; gap: 10px;">
        <a id="btnPlataforma" class="btn external" href="#" target="_blank" style="text-align: center; text-decoration: none;">Entrar a Jugar</a>
        
        <!-- Botón de Bienvenida -->
        <a class="btn bonus" href="cargar.html?promo=new" style="text-align: center; text-decoration: none; background: #c29c36; color: #000; font-weight: bold;">Bono Bienvenida (35%)</a>
        
        <!-- Nuevo Botón de Bono del Día (Reemplaza al banner) -->
        <a id="btnBonoDia" class="btn" href="cargar.html?promo=today" style="text-align: center; text-decoration: none; background: #1e2029; border: 1px solid #d4af37; color: #d4af37;">Bono del Día (...)</a>
      </div>

      <!-- Botones de Transacción -->
      <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
        <a class="btn warn" href="cargar.html" style="text-align: center; text-decoration: none;">Cargar Normal</a>
        <a class="btn" href="retirar.html" style="text-align: center; text-decoration: none;">Retirar</a>
      </div>
      
      <!-- Soporte -->
      <button class="btn ok" id="btnAtencionDinamica" style="width:100%; margin-top: 15px; padding: 12px;">Conectando...</button>

      <footer class="center" style="margin-top: 25px; font-size: 11px; opacity: 0.5;">
        © <span id="year"></span> VegasBett • +18 Jugar con responsabilidad
      </footer>
    </div>
  </div>
</body>
</html>
