<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VegasBett — Centro de Atención</title>
  <link rel="stylesheet" href="assets/styles.css?v=20"/>
  <style>
    /* Estilo Premium para el Botón del Día */
    .btn-diario {
      background: linear-gradient(45deg, #1e2029, #2a2d3a);
      border: 2px solid #d4af37 !important;
      color: #d4af37 !important;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
    }
    
    .btn-diario:after {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: rgba(255,255,255,0.05);
      transform: rotate(45deg);
    }
  </style>
  <script>
    window.VEGASBETT_CONFIG = {
      ATENCION: {
        CLARA: { nombre: "Clara", numero: "5492236631329", inicio: 8, fin: 20 },
        JULI: { nombre: "Juli", numero: "5492235393540", inicio: 20, fin: 8 }
      },
      PLATAFORMA_URL: "https://ganamosnet.club/home",
      PROMOS: { 0: 10, 1: 5, 2: 10, 3: 5, 4: 5, 5: 10, 6: 10 }
    };

    window.addEventListener('DOMContentLoaded', () => {
        const ahora = new Date();
        const config = window.VEGASBETT_CONFIG;
        const porcentajeHoy = config.PROMOS[ahora.getDay()];
        const encargado = (ahora.getHours() >= config.ATENCION.CLARA.inicio && ahora.getHours() < config.ATENCION.CLARA.fin) ? config.ATENCION.CLARA : config.ATENCION.JULI;
        
        document.getElementById('btnAtencionDinamica').textContent = `Chatear con ${encargado.nombre} (Online)`;
        document.getElementById('btnAtencionDinamica').onclick = () => {
            window.open(`https://wa.me/${encargado.numero}?text=Hola%20${encargado.nombre},%20necesito%20ayuda%20con%20VegasBett.`, "_blank");
        };

        document.getElementById('btnBonoDia').innerHTML = `✨ Bono del Día (${porcentajeHoy}%) ✨`;
        document.getElementById('year').textContent = ahora.getFullYear();
        document.getElementById('btnPlataforma').href = config.PLATAFORMA_URL;
    });
  </script>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="brand center" style="font-size: 24px; font-weight: bold; color: #d4af37; margin-bottom: 5px;">🎰 VegasBett</div>
      
      <!-- CONTENEDOR DE IMAGEN FORZADO A SER PEQUEÑO -->
      <div style="width: 85%; max-width: 320px; margin: 15px auto; border-radius: 12px; overflow: hidden; border: 1px solid #333; line-height: 0;">
        <img src="assets/portada_paginaweb.png" style="width: 100%; height: auto; display: block;" alt="VegasBett">
      </div>

      <h1 class="center" style="font-size: 1rem; margin-bottom: 15px; opacity: 0.8;">Panel de Control</h1>

      <div class="featured-actions" style="display: flex; flex-direction: column; gap: 12px;">
        <a id="btnPlataforma" class="btn external" href="#" target="_blank" style="text-align: center; text-decoration: none; padding: 15px;">ENTRAR A JUGAR</a>
        
        <a class="btn bonus" href="cargar.html?promo=new" style="text-align: center; text-decoration: none; background: #c29c36; color: #000; font-weight: bold; padding: 12px;">Bono Bienvenida (35%)</a>
        
        <!-- BOTÓN MEJORADO -->
        <a id="btnBonoDia" class="btn btn-diario" href="cargar.html?promo=today" style="text-align: center; text-decoration: none; padding: 12px;">Bono del Día (...)</a>
      </div>

      <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
        <a class="btn warn" href="cargar.html" style="text-align: center; text-decoration: none; font-size: 14px;">Carga Normal</a>
        <a class="btn" href="retirar.html" style="text-align: center; text-decoration: none; font-size: 14px;">Retirar</a>
      </div>
      
      <button class="btn ok" id="btnAtencionDinamica" style="width:100%; margin-top: 15px; padding: 14px; font-weight: bold;">Conectando...</button>

      <footer class="center" style="margin-top: 25px; font-size: 11px; opacity: 0.5;">
        © <span id="year"></span> VegasBett • +18 Jugar con responsabilidad
      </footer>
    </div>
  </div>
</body>
</html>
