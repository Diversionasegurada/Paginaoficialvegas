<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VegasBett — Centro de Atención</title>
  <link rel="stylesheet" href="assets/styles.css?v=18"/>

  <script>
    // 1. CONFIGURACIÓN ACTUALIZADA
    window.VEGASBETT_CONFIG = {
      ATENCION: {
        CLARA: { nombre: "Clara", numero: "5492236631329", inicio: 8, fin: 20 },
        JULI: { nombre: "Juli", numero: "5492235393540", inicio: 20, fin: 8 }
      },
      PLATAFORMA_URL: "https://ganamosnet.club/home",
      PROMO_BONUS_BY_DAY: { 0: 10, 1: 5, 2: 10, 3: 5, 4: 5, 5: 10, 6: 10 },
      MIN_CARGA_PROMO: 4000,
      MIN_CARGA_NUEVO: 1000,
      BONO_NUEVO_PORCENTAJE: 35
    };

    function inicializarPagina() {
        const ahora = new Date();
        const hora = ahora.getHours();
        const diaSemana = ahora.getDay();
        const config = window.VEGASBETT_CONFIG;
        
        // --- LÓGICA DE TURNOS ---
        let encargado = (hora >= config.ATENCION.CLARA.inicio && hora < config.ATENCION.CLARA.fin) 
                        ? config.ATENCION.CLARA 
                        : config.ATENCION.JULI;

        const btnAtencion = document.getElementById('btnAtencionDinamica');
        if (btnAtencion) {
            btnAtencion.textContent = "Chatear con " + encargado.nombre + " (Online)";
            btnAtencion.onclick = () => {
                const mensaje = encodeURIComponent("Hola " + encargado.nombre + ", necesito atención en VegasBett.");
                window.open("https://wa.me/" + encargado.numero + "?text=" + mensaje, "_blank");
            };
        }

        // --- LÓGICA DEL BANNER DE BONO ---
        const DIAS = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
        const bonoHoy = config.PROMO_BONUS_BY_DAY[diaSemana];
        const ticker = document.getElementById('promoTicker');
        const promoText = document.getElementById('promoText');

        if (bonoHoy && ticker) {
            promoText.textContent = "Hoy " + DIAS[diaSemana] + ": bono +" + bonoHoy + "% (Mínimo $" + config.MIN_CARGA_PROMO + ")";
            ticker.classList.remove('hidden');
        }

        // --- EXTRAS ---
        if (document.getElementById('infoHorario')) {
            document.getElementById('infoHorario').textContent = "Atención: Clara (08 a 20hs) • Juli (20 a 08hs)";
        }
        if (document.getElementById('year')) {
            document.getElementById('year').textContent = ahora.getFullYear();
        }
        
        // Actualizar link de plataforma
        const btnPlataforma = document.getElementById('btnPlataforma');
        if (btnPlataforma) btnPlataforma.href = config.PLATAFORMA_URL;
    }

    window.addEventListener('DOMContentLoaded', inicializarPagina);
  </script>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="brand"><span>🎰 VegasBett</span><span class="badge">Atención 24/7</span></div>
      </div>

      <div class="logo-hero">
        <img src="assets/portada_paginaweb.png" alt="VegasBett" class="logo-img"/>
      </div>

      <h1 class="center">¿Qué necesitás hacer hoy?</h1>

      <p class="center gold-legend">
        Página oficial de <strong>VEGASBETT</strong> — jugá distinto, jugá seguro.
        <span class="gold-promo">Bono del 35% para nuevos (mínimo $1.000).</span>
      </p>

      <a id="promoTicker" class="promo-ticker hidden" href="cargar.html?promo=today">
        <span class="promo-led"></span>
        <span id="promoText">Cargando promos...</span>
        <span class="promo-cta">Aprovechar →</span>
      </a>

      <div class="featured-actions" style="margin-top: 15px;">
        <a id="btnPlataforma" class="btn external" href="#" target="_blank">Ir a GanamosNet</a>
        <a class="btn bonus" href="cargar.html?promo=new">Soy nuevo (bono 35%)</a>
      </div>

      <div class="grid">
        <a class="btn warn" href="cargar.html">Quiero Cargar</a>
        <a class="btn" href="retirar.html">Quiero Retirar</a>
        <button class="btn ok" id="btnAtencionDinamica">Cargando atención...</button>
        <button class="btn secondary" onclick="window.location.href='https://wa.me/5492235393540?text=Hola, necesito ayuda técnica.'">Centro de Ayuda</button>
      </div>
      
      <p class="center small sub" id="infoHorario" style="margin-top: 10px; font-size: 11px;"></p>

      <footer class="center">© <span id="year"></span> VegasBett • Jugá responsable • + 18 años.</footer>
    </div>
  </div>
</body>
</html>
