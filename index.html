<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VegasBett — Centro de Atención</title>
  <link rel="stylesheet" href="assets/styles.css?v=18"/>

  <script>
    // 1. CONFIGURACIÓN INTEGRADA (Para que no falle nunca)
    window.VEGASBETT_CONFIG = {
      ATENCION: {
        CLARA: { nombre: "Clara", numero: "5492235393540", inicio: 8, fin: 20 },
        JULI: { nombre: "Juli", numero: "5492236914771", inicio: 20, fin: 8 }
      },
      MARCA: "VegasBett",
      CBU: "0000085700274606489697",
      ALIAS: "Vegasbett",
      TITULAR: "Milagros Diana Maricel Quinonez"
    };

    // 2. LÓGICA DE TURNOS
    function inicializarPagina() {
        const hora = new Date().getHours();
        const config = window.VEGASBETT_CONFIG.ATENCION;
        let encargado;

        // Determinamos quién atiende
        if (hora >= config.CLARA.inicio && hora < config.CLARA.fin) {
            encargado = config.CLARA;
        } else {
            encargado = config.JULI;
        }

        // Actualizamos los elementos de la página
        const btnAtencion = document.getElementById('btnAtencionDinamica');
        const infoHorario = document.getElementById('infoHorario');
        const yearSpan = document.getElementById('year');

        if (btnAtencion) {
            btnAtencion.textContent = "Chatear con " + encargado.nombre + " (Online)";
            btnAtencion.onclick = function() {
                const mensaje = encodeURIComponent("Hola " + encargado.nombre + ", necesito atención en VegasBett.");
                window.open("https://wa.me/" + encargado.numero + "?text=" + mensaje, "_blank");
            };
        }

        if (infoHorario) {
            infoHorario.textContent = "Atención: Clara (08 a 20hs) • Juli (20 a 08hs)";
        }

        if (yearSpan) {
            yearSpan.textContent = new Date().getFullYear();
        }
        
        console.log("Sistema de turnos activado para: " + encargado.nombre);
    }

    // Ejecutar cuando cargue el DOM
    window.addEventListener('DOMContentLoaded', inicializarPagina);
  </script>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="brand"><span>🎰 VegasBett</span><span class="badge">Atención 24/7</span></div>
      </div>

      <div class="logo-hero">
        <img src="assets/portada_paginaweb.png" alt="VegasBett" class="logo-img"/>
      </div>

      <h1 class="center">¿Qué necesitás hacer hoy?</h1>
      <p class="center sub">Uso interno.</p>

      <p class="center gold-legend">
        Página oficial de <strong>VEGASBETT</strong> — jugá distinto, jugá seguro.
        <span class="gold-promo">Bono del 35% en tu primera carga (mínimo $500).</span>
      </p>

      <div class="featured-actions">
        <a class="btn external" href="https://ganamos.io/" target="_blank">Ir a ganamos.io</a>
        <a class="btn bonus" href="cargar.html?promo=new">Soy nuevo (bono 35%)</a>
      </div>

      <div class="grid">
        <a class="btn warn" href="cargar.html">Quiero Cargar</a>
        <a class="btn" href="retirar.html">Quiero Retirar</a>
        
        <button class="btn ok" id="btnAtencionDinamica">Cargando atención...</button>
        
        <button class="btn secondary" onclick="alert('Iniciando soporte...');">Centro de Ayuda</button>
      </div>
      
      <p class="center small sub" id="infoHorario" style="margin-top: 10px; font-size: 11px;"></p>

      <footer class="center">© <span id="year"></span> VegasBett • Jugá responsable • + 18 años.</footer>
    </div>
  </div>
</body>
</html>
